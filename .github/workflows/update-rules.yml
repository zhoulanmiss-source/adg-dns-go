name: Update rule files weekly

on:
  schedule:
    - cron: '0 3 * * 1'   # 每周一 11:00 (Asia/Shanghai) = 周一 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest rule files
        run: |
          mkdir -p rule
          curl -L -C- --retry 5 "https://raw.githubusercontent.com/lan-teacher/Serverless-Edge-DNS-Gateway/refs/heads/main/rules/allowlists.txt" -o rule/allowlists.txt
          curl -L -C- --retry 5 "https://raw.githubusercontent.com/lan-teacher/Serverless-Edge-DNS-Gateway/refs/heads/main/rules/blocklists.txt" -o rule/blocklists.txt
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add rule/allowlists.txt rule/blocklists.txt
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "chore: weekly update rule files"
          git push
